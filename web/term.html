/* ── pixel-perfect renderer ────────────────────────────────────── */
/* Build the entire framebuffer in JS using integer math.          */
/* Each font pixel → DPR×DPR physical pixels. Zero interpolation.  */
/* Then upload as a GL texture and draw one full-screen quad.       */

const canvas = document.getElementById('c');
canvas.style.width = (COLS * FW) + 'px';
canvas.style.height = (ROWS * FH) + 'px';
canvas.width = PW;
canvas.height = PH;

const diag = document.getElementById('diag');

/* framebuffer pixel data (RGBA, physical resolution) */
const fb = new Uint8Array(PW * PH * 4);

function renderFB() {

  for (let r = 0; r < ROWS; r++) {
    const baseY = r * cellH;
    for (let c = 0; c < COLS; c++) {
      const cl = grid[r][c];
      const baseX = c * cellW;
      const bg = cl.inv ? cl.fg : cl.bg;
      let fg = cl.inv ? cl.bg : cl.fg;

  const t=throbber[frame%throbber.length];
  if(++verbHold>25){verbHold=0;verbIdx=(verbIdx+1)%verbs.length;}
  const v=verbs[verbIdx],C='\x1b[';
  let s='';
  s+=C+'1;1H'+C+'2K'+C+'38;2;180;140;255m'+C+'1m  dumbterm WebGL'+C+'0m';
  s+=C+'2;1H'+C+'2K'+C+'38;2;60;60;60m'+'\u2500'.repeat(COLS)+C+'0m';
  s+=C+'4;1H'+C+'2K'+C+'38;2;200;200;200m  Pixel-perfect: every pixel computed in JS, zero GL interpolation. Frame '+frame+C+'0m';
  s+=C+'6;1H'+C+'2K'+C+'38;2;255;200;50m  '+t+' '+v+'\u2026'+C+'0m';
  const badge='Auto-updating\u2026';
  s+=C+'6;'+(COLS-badge.length)+'H'+C+'38;2;100;100;100m'+badge+C+'0m';
  s+=C+'8;1H'+C+'2K'+C+'38;2;100;100;100m  Box: \u250c\u2500\u2500\u2500\u2500\u2500\u2510 Block: \u2588\u2593\u2592\u2591  Half: \u258c\u2590'+C+'0m';
  s+=C+'9;1H'+C+'2K'+C+'38;2;100;100;100m       \u2502     \u2502 Cross: \u253c\u252c\u2534\u251c\u2524'+C+'0m';
  s+=C+'10;1H'+C+'2K'+C+'38;2;100;100;100m       \u2514\u2500\u2500\u2500\u2500\u2500\u2518 =_|#@$%'+C+'0m';
  s+=C+(ROWS-2)+';1H'+C+'2K'+C+'38;2;60;60;60m'+'\u2500'.repeat(COLS)+C+'0m';
  s+=C+(ROWS-1)+';1H'+C+'2K'+C+'48;2;30;30;30m'+C+'38;2;150;150;150m  \u23f5\u23f5 dumbterm (frame '+frame+')'+C+'0m';
  s+=C+ROWS+';1H'+C+'2K'+C+'38;2;100;200;255m'+C+'1m> '+C+'0m';
  vtFeed(s);frame++;render();
}

window.DumbTerm={write:function(d){vtFeed(d);render();},grid,cols:COLS,rows:ROWS,canvas};
gridClear(); render();

/* ── WebSocket mode (when served via server.js) or demo mode ───── */
let ws = null;
let demoInterval = null;

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');

  ws.onopen = () => {
    document.title = 'dumbterm — connected';
    console.log('WS connected to PTY server');
    if (demoInterval) { clearInterval(demoInterval); demoInterval = null; }
    gridClear(); render();
    ws.send('\x1b_RESIZE;' + COLS + ';' + ROWS + '\x1b\\');
  };

  /* Persistent streaming decoder — buffers partial UTF-8 across WS messages */
  const _dec = new TextDecoder('utf-8', {fatal: false});
  ws.onmessage = (e) => {
    let text;
    if (typeof e.data === 'string') text = e.data;
    else if (e.data instanceof ArrayBuffer) text = _dec.decode(e.data, {stream: true});
    else if (e.data instanceof Blob) { e.data.arrayBuffer().then(ab => { vtFeed(_dec.decode(ab, {stream: true})); render(); }); return; }
    if (text) {
      vtFeed(text); render();
      /* one-shot grid dump: check row 0 bg colors after first few renders */
      if (!window._gridDumped && render._count > 3) {
        window._gridDumped = true;
        const bgColors = [];
        for (let c = 0; c < 20; c++) {
          const bg = grid[0][c].bg;
          bgColors.push(c + ':' + bg.join(','));
        }
        console.log('ROW 0 bg after render #' + render._count + ': ' + bgColors.join(' | '));
        /* also row 1 */
        const bg1 = [];
        for (let c = 0; c < 20; c++) bg1.push(c + ':' + grid[1][c].bg.join(','));
        console.log('ROW 1 bg: ' + bg1.join(' | '));
      }
    }
  };

  ws.onclose = () => {
    console.log('disconnected');
    ws = null;
    vtFeed('\r\n\x1b[38;2;255;100;100m[connection closed]\x1b[0m\r\n');
    render();
  };

  ws.onerror = () => {
    /* server not running — fall back to demo mode */
    ws = null;
    startDemo();
  };
}

function startDemo() {
  vtFeed('\x1b[?25l\x1b[2J');
  vtFeed('\x1b[1;1H\x1b[38;2;255;200;100mNo server — running demo. Start server: node server.js -- claude\x1b[0m\r\n');
  render();
  demoInterval = setInterval(demoFrame, 80);
}

/* keyboard input → WebSocket (or ignore in demo mode) */
document.addEventListener('keydown', (e) => {
  if (!ws || ws.readyState !== 1) return;
  let data = '';
  const ctrl = e.ctrlKey, alt = e.altKey, shift = e.shiftKey;

  if (ctrl && !alt && !shift) {
    /* Ctrl+key → control char */
    if (e.key.length === 1) {
      const code = e.key.toUpperCase().charCodeAt(0);
      if (code >= 65 && code <= 90) { data = String.fromCharCode(code - 64); }
    }
    if (e.key === 'c') data = '\x03';
    if (e.key === 'd') data = '\x04';
    if (e.key === 'z') data = '\x1a';
    if (e.key === 'l') data = '\x0c';
    if (e.key === 'u') data = '\x15';
    if (e.key === 'w') data = '\x17';
  } else if (!ctrl && !alt) {
    switch (e.key) {
      case 'Enter': data = '\r'; break;
      case 'Backspace': data = '\x7f'; break;
      case 'Tab': data = '\t'; break;
      case 'Escape': data = '\x1b'; break;
      case 'ArrowUp': data = '\x1b[A'; break;
      case 'ArrowDown': data = '\x1b[B'; break;
      case 'ArrowRight': data = '\x1b[C'; break;
      case 'ArrowLeft': data = '\x1b[D'; break;
      case 'Home': data = '\x1b[H'; break;
      case 'End': data = '\x1b[F'; break;
      case 'Delete': data = '\x1b[3~'; break;
      case 'PageUp': data = '\x1b[5~'; break;
      case 'PageDown': data = '\x1b[6~'; break;
      case 'F1': data = '\x1bOP'; break;
      case 'F2': data = '\x1bOQ'; break;
      case 'F3': data = '\x1bOR'; break;
      case 'F4': data = '\x1bOS'; break;
      default:
        if (e.key.length === 1) data = e.key;
    }
  } else if (alt && !ctrl) {
    /* Alt+key → ESC + key (meta) */
    if (e.key.length === 1) data = '\x1b' + e.key;
  }

  if (data) {
    e.preventDefault();
    ws.send(data);
  }
});

/* try connecting; fall back to demo if no server */
if (location.protocol === 'file:') {
  startDemo();
} else {
  connectWS();
}
</script>
